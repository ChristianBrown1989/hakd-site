<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c97e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left gold accent bar -->
  <rect x="80" y="180" width="3" height="270" fill="url(#gold)" opacity="0.85"/>

  <!-- HAKD badge -->
  <rect x="110" y="180" width="90" height="36" rx="6" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
  <text x="155" y="203" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="700" fill="#c9a84c" text-anchor="middle" letter-spacing="3">HAKD</text>

  <!-- Main headline -->
  <text x="110" y="300" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="66" font-weight="800" fill="#ffffff" letter-spacing="-2">Performance</text>
  <text x="110" y="378" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="66" font-weight="800" letter-spacing="-2" fill="url(#gold)">Intelligence</text>

  <!-- Subtext -->
  <text x="110" y="434" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="21" fill="#888888" letter-spacing="-0.2">Evidence-based protocols for HRV, nervous system &amp; recovery</text>

  <!-- HRV wave decoration -->
  <polyline points="820,310 860,270 900,330 940,230 980,290 1020,250 1060,300 1100,220 1140,280 1180,310" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
  <polyline points="820,310 860,270 900,330 940,230 980,290 1020,250 1060,300 1100,220 1140,280 1180,310" fill="none" stroke="#c9a84c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.05"/>

  <!-- Domain -->
  <text x="1120" y="592" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#555555" text-anchor="end" letter-spacing="1">hakd.app</text>
</svg>
